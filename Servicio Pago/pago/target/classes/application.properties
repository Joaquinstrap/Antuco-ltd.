spring.application.name=pago
server.port=8084

# Pon "mysql" o "mariadb" acorde a tu pc, edita el usuario igual
spring.profiles.active=mariadb

# BD: pago_bd

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true
spring.flyway.repeatable-sql-migration-prefix=true
spring.flyway.locations=classpath:db/migration

# Logs por si la cosa no funca en postman, sirven un monton
logging.level.org.springframework.security=DEBUG


eureka.client.service-url.defaultZone=http://localhost:8761/eureka
# spring.cloud.compatibility-verifier.enabled=false
spring.flyway.validate-on-migrate=false