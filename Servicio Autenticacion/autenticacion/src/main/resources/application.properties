spring.application.name=usuarios

server.port=8083
spring.datasource.url=jdbc:mysql://localhost:3306/usuarios_bd
#spring.datasource.url=jdbc:mariadb://localhost:3306/carrito_bd
spring.datasource.username=root
spring.datasource.password=

#spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate

spring.flyway.baseline-on-migrate=true
spring.flyway.enabled=true
spring.flyway.repeatable-sql-migration-prefix=true
spring.flyway.locations=classpath:db/migration

# Clave secreta para el Token
app.jwt-secret=ClaveSuperSecretaParaElProyectoDeDuoc123456
app.jwt-expiration-millis=86400000
